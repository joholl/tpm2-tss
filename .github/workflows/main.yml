name: CI
on:
  [push, pull_request]
jobs:
  build-test:
    runs-on: ubuntu-latest
    if: "!contains(github.ref, 'coverity_scan')"
    strategy:
      matrix:
        docker_image: [
          ghcr.io/tpm2-software/fedora-32,
          ghcr.io/tpm2-software/opensuse-leap,
          ghcr.io/tpm2-software/ubuntu-22.04,
          ghcr.io/tpm2-software/ubuntu-24.04,
          ghcr.io/tpm2-software/alpine-3.15,
          ghcr.io/tpm2-software/arch-linux
        ]
        compiler: [gcc, clang]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - name: fix-sanitizer
        run: sudo sysctl vm.mmap_rnd_bits=28
      - name: Launch Action
        env:
          DOCKER_IMAGE: ${{ matrix.docker_image }}
          CC: ${{ matrix.compiler }}
          BASE_REF: ${{ github.base_ref }}
          WITH_TCTI: libtpms
          PROJECT_NAME: ${{ github.event.repository.name }}
        run: script/ci.sh
      - name: failure
        if: ${{ failure() }}
        run: |
          cat $(find ../ -name config.log) || true
          cat $(find ../ -name test-suite.log) || true
  scanbuild:
    runs-on: ubuntu-latest
    if: "!contains(github.ref, 'coverity_scan')"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - name: fix-sanitizer
        run: sudo sysctl vm.mmap_rnd_bits=28
      - name: Launch Action
        env:
          CC: clang
          DOCKER_IMAGE: ghcr.io/tpm2-software/fedora-32
          SCANBUILD: yes
          WITH_TCTI: swtpm
          PROJECT_NAME: ${{ github.event.repository.name }}
        run: script/ci.sh
      - name: failure
        if: ${{ failure() }}
        run: |
          cat $(find ../ -name config.log) || true
          cat $(find ../ -name test-suite.log) || true
  test-tcti-config:
    runs-on: ubuntu-latest
    if: "!contains(github.ref, 'coverity_scan')"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - name: fix-sanitizer
        run: sudo sysctl vm.mmap_rnd_bits=28
      - name: Launch Action
        env:
          CC: gcc
          DOCKER_IMAGE: ghcr.io/tpm2-software/fedora-32
          TEST_TCTI_CONFIG: true
          PROJECT_NAME: ${{ github.event.repository.name }}
        run: script/ci.sh
      - name: failure
        if: ${{ failure() }}
        run: |
          cat $(find ../ -name config.log) || true
          cat $(find ../ -name test-suite.log) || true
  test-mbedtls:
    runs-on: ubuntu-latest
    if: "!contains(github.ref, 'coverity_scan')"
    strategy:
      matrix:
        docker_image: [
          ghcr.io/tpm2-software/ubuntu-20.04,
          ghcr.io/tpm2-software/ubuntu-22.04-mbedtls-3.1
        ]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - name: fix-sanitizer
        run: sudo sysctl vm.mmap_rnd_bits=28
      - name: Launch Action
        env:
          CC: gcc
          DOCKER_IMAGE: ${{ matrix.docker_image }}
          WITH_CRYPTO: mbed
          WITH_TCTI: mssim
          PROJECT_NAME: ${{ github.event.repository.name }}
        run: script/ci.sh
      - name: failure
        if: ${{ failure() }}
        run: |
          cat $(find ../ -name config.log) || true
          cat $(find ../ -name test-suite.log) || true
  test-no-crypto-build:
    runs-on: ubuntu-latest
    if: "!contains(github.ref, 'coverity_scan')"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - name: fix-sanitizer
        run: sudo sysctl vm.mmap_rnd_bits=28
      - name: Launch Action
        env:
          CC: gcc
          DOCKER_IMAGE: ghcr.io/tpm2-software/ubuntu-20.04
          WITH_CRYPTO: none
          PROJECT_NAME: ${{ github.event.repository.name }}
        run: script/ci.sh
      - name: failure
        if: ${{ failure() }}
        run: |
          cat $(find ../ -name config.log) || true
          cat $(find ../ -name test-suite.log) || true
  test-coverage:
    runs-on: ubuntu-latest
    if: "!contains(github.ref, 'coverity_scan')"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - name: fix-sanitizer
        run: sudo sysctl vm.mmap_rnd_bits=28
      - name: Launch Action
        env:
          CC: gcc
          DOCKER_IMAGE: ghcr.io/tpm2-software/ubuntu-20.04
          ENABLE_COVERAGE: true
          WITH_TCTI: swtpm
          PROJECT_NAME: ${{ github.event.repository.name }}
        run: script/ci.sh
      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.info
          fail_ci_if_error: true
          verbose: true
      - name: failure
        if: ${{ failure() }}
        run: |
          cat $(find ../ -name config.log) || true
          cat $(find ../ -name test-suite.log) || true
  test-fuzz:
    runs-on: ubuntu-latest
    if: "!contains(github.ref, 'coverity_scan')"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - name: Launch Action
        env:
          DOCKER_IMAGE: ghcr.io/tpm2-software/fedora-32
          GEN_FUZZ: 1
          CXX: clang++
          CC: clang
          PROJECT_NAME: ${{ github.event.repository.name }}
        run: script/ci.sh
      - name: failure
        if: ${{ failure() }}
        run: |
          cat $(find ../ -name config.log) || true
          cat $(find ../ -name test-suite.log) || true
  coverity-test:
    runs-on: ubuntu-latest
    if: contains(github.ref, 'coverity_scan')
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - name: fix-sanitizer
        run: sudo sysctl vm.mmap_rnd_bits=28
      - name: Launch Coverity Action
        uses:
          tpm2-software/ci/coverityScan@main
        with:
          PROJECT_NAME: ${{ github.event.repository.name }}
          REPO_BRANCH: ${{ github.ref }}
          REPO_NAME: ${{ github.repository }}
          ENABLE_COVERITY: true
          DOCKER_IMAGE: ghcr.io/tpm2-software/ubuntu-20.04
          CC: gcc
          COVERITY_SCAN_TOKEN: ${{ secrets.COVERITY_SCAN_TOKEN }}
          COVERITY_SUBMISSION_EMAIL: tadeusz.struk@intel.com
      - name: failure
        if: ${{ failure() }}
        run: |
          cat $(find ../ -name config.log) || true
          cat $(find ../ -name test-suite.log) || true
