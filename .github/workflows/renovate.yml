# Run locally:
# docker run --rm --env LOG_LEVEL=debug -v$PWD:/usr/src/app renovate/renovate --platform=local --dry-run=lookup

name: Renovate
on:
  schedule:
    - cron: '0/15 * * * *' # quote because asterisk is a special character in YAML
  workflow_dispatch:
jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Run renovate to update dependencies
        uses: renovatebot/github-action@v46.1.5
        with:
          configurationFile: .github/renovate-config.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: debug
          RENOVATE_REPOSITORIES: ${{ github.repository }}
